<!DOCTYPE html>
<html>
<head>
<title>AI Face Gate System - TruView IP Cam</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cyan: #00ffe7;
    --green: #39ff14;
    --red: #ff2d55;
    --yellow: #ffe600;
    --bg: #050d1a;
    --panel: #0a1628;
    --border: rgba(0,255,231,0.25);
  }

  body {
    background: var(--bg);
    color: white;
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,231,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,231,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    padding: 24px 0 8px;
    text-align: center;
  }

  header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.8rem;
    font-weight: 900;
    letter-spacing: 6px;
    color: var(--cyan);
    text-shadow: 0 0 20px var(--cyan), 0 0 40px rgba(0,255,231,0.3);
  }

  header p {
    color: rgba(0,255,231,0.5);
    font-size: 0.7rem;
    letter-spacing: 4px;
    margin-top: 4px;
  }

  .main-layout {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 20px;
    align-items: flex-start;
    padding: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ── Video Panel ── */
  .video-panel { position: relative; }

  .video-wrapper {
    position: relative;
    border: 2px solid var(--cyan);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(0,255,231,0.2), inset 0 0 30px rgba(0,255,231,0.03);
    width: 500px;
    height: 375px;
    background: #000;
  }

  /* The img tag for MJPEG stream */
  #camImg {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Hidden canvas for frame capture */
  #canvas { display: none; }

  .video-wrapper::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,255,231,0.015) 2px, rgba(0,255,231,0.015) 4px
    );
    pointer-events: none;
    z-index: 2;
  }

  .corner { position: absolute; width: 20px; height: 20px; z-index: 3; }
  .corner.tl { top:-2px; left:-2px; border-top:3px solid var(--cyan); border-left:3px solid var(--cyan); }
  .corner.tr { top:-2px; right:-2px; border-top:3px solid var(--cyan); border-right:3px solid var(--cyan); }
  .corner.bl { bottom:-2px; left:-2px; border-bottom:3px solid var(--cyan); border-left:3px solid var(--cyan); }
  .corner.br { bottom:-2px; right:-2px; border-bottom:3px solid var(--cyan); border-right:3px solid var(--cyan); }

  .reticle {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -55%);
    width: 150px; height: 185px;
    border: 2px dashed rgba(0,255,231,0.45);
    border-radius: 50% 50% 40% 40%;
    pointer-events: none;
    z-index: 3;
    animation: reticle-pulse 2s ease-in-out infinite;
  }

  @keyframes reticle-pulse {
    0%,100% { border-color: rgba(0,255,231,0.4); }
    50% { border-color: rgba(0,255,231,0.9); box-shadow: 0 0 14px rgba(0,255,231,0.3); }
  }

  .scan-line {
    position: absolute;
    left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.6;
    pointer-events: none;
    z-index: 4;
    animation: scan 3s linear infinite;
  }

  @keyframes scan {
    0% { top: 0; opacity: 0.8; }
    100% { top: 100%; opacity: 0; }
  }

  .auth-flash {
    position: absolute; inset: 0;
    opacity: 0; pointer-events: none; z-index: 5; transition: opacity 0.1s;
  }
  .auth-flash.open  { background: rgba(57,255,20,0.15); animation: flash 0.5s forwards; }
  .auth-flash.closed { background: rgba(255,45,85,0.15); animation: flash 0.5s forwards; }
  @keyframes flash { 0%{opacity:1} 100%{opacity:0} }

  /* Camera offline overlay */
  .cam-offline {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(5,13,26,0.92);
    z-index: 6;
    gap: 10px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 3px;
    color: var(--red);
    text-shadow: 0 0 10px var(--red);
  }
  .cam-offline svg { width: 48px; opacity: 0.7; }
  .cam-offline.hidden { display: none; }

  /* ── IP Config Bar ── */
  .ip-bar {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 14px;
    margin-bottom: 4px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 740px;
    width: 100%;
  }

  .ip-bar label {
    font-size: 0.6rem;
    letter-spacing: 3px;
    color: rgba(0,255,231,0.5);
    text-transform: uppercase;
    white-space: nowrap;
  }

  .ip-bar input {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    color: var(--cyan);
    padding: 6px 10px;
    border-radius: 3px;
    outline: none;
    width: 200px;
    letter-spacing: 1px;
  }

  .ip-bar input:focus { border-color: var(--cyan); box-shadow: 0 0 8px rgba(0,255,231,0.2); }

  .ip-bar select {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--border);
    color: var(--cyan);
    padding: 6px 8px;
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }

  .btn-connect {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 2px;
    padding: 7px 14px;
    border: 1px solid var(--cyan);
    border-radius: 3px;
    background: transparent;
    color: var(--cyan);
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .btn-connect:hover { background: rgba(0,255,231,0.08); }

  .cam-status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 8px var(--red);
    transition: all 0.4s;
    flex-shrink: 0;
  }
  .cam-status-dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); animation: blink 1.5s infinite; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── Right Panel ── */
  .right-panel { display: flex; flex-direction: column; gap: 14px; width: 240px; }

  .info-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px;
  }

  .info-box > label {
    font-size: 0.58rem;
    letter-spacing: 3px;
    color: rgba(0,255,231,0.5);
    text-transform: uppercase;
    display: block;
    margin-bottom: 8px;
  }

  #status {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 12px;
    border-radius: 4px;
    text-align: center;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(0,255,231,0.2);
    color: var(--yellow);
    transition: all 0.3s;
    text-shadow: 0 0 10px currentColor;
  }
  #status.open        { color: var(--green); border-color: var(--green); box-shadow: 0 0 20px rgba(57,255,20,0.2); background: rgba(57,255,20,0.05); }
  #status.denied      { color: var(--red);   border-color: var(--red);   box-shadow: 0 0 20px rgba(255,45,85,0.2); background: rgba(255,45,85,0.05); }

  .meter-label { display: flex; justify-content: space-between; font-size: 0.6rem; color: rgba(0,255,231,0.5); letter-spacing: 2px; margin-bottom: 6px; }
  .meter-bar { height: 8px; background: rgba(0,0,0,0.5); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .meter-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--red), var(--yellow), var(--green)); border-radius: 4px; transition: width 0.5s ease; }

  .btn-group { display: flex; flex-direction: column; gap: 8px; }

  button.action-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 11px 14px;
    border: 1px solid;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    position: relative; overflow: hidden;
  }
  button.action-btn::before { content:''; position:absolute; inset:0; background:currentColor; opacity:0; transition:opacity 0.2s; }
  button.action-btn:hover::before { opacity:0.1; }
  button.action-btn:active { transform: scale(0.98); }

  .btn-register { color: var(--cyan); border-color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }
  .btn-register.registered { color: var(--green); border-color: var(--green); text-shadow: 0 0 8px var(--green); }
  .btn-bt { color: rgba(0,255,231,0.5); border-color: rgba(0,255,231,0.25); }

  #face-badge { display:none; align-items:center; gap:8px; font-size:0.6rem; letter-spacing:2px; color:var(--green); text-shadow:0 0 8px var(--green); }
  #face-badge.visible { display: flex; }
  .dot { width:7px; height:7px; border-radius:50%; background:var(--green); animation:blink 1.5s ease-in-out infinite; }

  input[type=range] { width:100%; accent-color:var(--cyan); cursor:pointer; margin-top:4px; }
  #threshold-val { font-size:0.72rem; color:var(--cyan); float:right; }

  #log { font-size:0.62rem; color:rgba(0,255,231,0.45); height:85px; overflow-y:auto; line-height:1.9; }
  #log::-webkit-scrollbar { width:3px; }
  #log::-webkit-scrollbar-thumb { background:var(--border); }
  .log-entry { display:block; }
  .log-entry.grant { color: rgba(57,255,20,0.75); }
  .log-entry.deny  { color: rgba(255,45,85,0.65); }
  .log-entry.info  { color: rgba(0,255,231,0.5); }
</style>
</head>
<body>

<header>
  <h1>⬡ Face Gate System</h1>
  <p>TRUVIEW IP CAMERA — BIOMETRIC ACCESS CONTROL v2.0</p>
</header>

<!-- IP Config Bar -->
<div class="ip-bar">
  <label>Camera IP</label>
  <input type="text" id="ipInput" value="192.168.43.100" placeholder="e.g. 192.168.43.100">

  <label>Stream</label>
  <select id="streamSelect">
    <option value="/videostream.cgi">MJPEG /videostream.cgi</option>
    <option value="/mjpeg/1">MJPEG /mjpeg/1</option>
    <option value="/video.mjpeg">/video.mjpeg</option>
    <option value="/cgi-bin/mjpeg">/cgi-bin/mjpeg</option>
    <option value="/stream">MJPEG /stream</option>
    <option value="/live">MJPEG /live</option>
    <option value="/snapshot.cgi" id="snapshotOpt">Snapshot /snapshot.cgi</option>
    <option value="custom">Custom URL...</option>
  </select>

  <input type="text" id="customUrl" placeholder="Full custom URL" style="display:none; width:240px;">
  <div class="cam-status-dot" id="camDot"></div>
  <button class="btn-connect" onclick="connectCamera()">Connect</button>
</div>

<div class="main-layout">

  <div class="video-panel">
    <div class="video-wrapper" id="videoWrapper">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="reticle"></div>
      <div class="scan-line"></div>
      <div class="auth-flash" id="authFlash"></div>

      <!-- MJPEG / snapshot image -->
      <img id="camImg" src="" alt="" crossorigin="anonymous">

      <!-- Hidden canvas for pixel capture -->
      <canvas id="canvas" width="500" height="375"></canvas>

      <div class="cam-offline" id="camOffline">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M15 10l4.553-2.069A1 1 0 0121 8.82v6.36a1 1 0 01-1.447.89L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
          <line x1="2" y1="2" x2="22" y2="22" stroke="currentColor"/>
        </svg>
        <span id="offlineMsg">CAMERA OFFLINE</span>
        <span style="font-size:0.55rem; color:rgba(255,45,85,0.6); letter-spacing:2px;">Check IP / network</span>
      </div>
    </div>
  </div>

  <div class="right-panel">

    <div class="info-box">
      <label>Gate Status</label>
      <div id="status">AWAITING CAMERA</div>
    </div>

    <div class="info-box">
      <label>Match Confidence</label>
      <div class="meter-label">
        <span>LOW</span>
        <span id="conf-pct">—</span>
        <span>HIGH</span>
      </div>
      <div class="meter-bar"><div class="meter-fill" id="meterFill"></div></div>
    </div>

    <div class="info-box">
      <label>Sensitivity Threshold</label>
      <span id="threshold-val">50</span>
      <input type="range" id="thresholdSlider" min="20" max="80" value="50"
        oninput="document.getElementById('threshold-val').innerText=this.value">
    </div>

    <div class="info-box btn-group">
      <label>Controls</label>
      <button class="action-btn btn-register" id="registerBtn" onclick="registerFace()">[ Register Face ]</button>
      <div id="face-badge"><div class="dot"></div> FACE ENROLLED</div>
      <button class="action-btn btn-bt" onclick="connectBluetooth()">[ Connect Bluetooth ]</button>
    </div>

    <div class="info-box">
      <label>Activity Log</label>
      <div id="log"></div>
    </div>

  </div>
</div>

<script>
/* ════════════════════════════════════════════
   ELEMENTS
════════════════════════════════════════════ */
const camImg       = document.getElementById("camImg");
const canvas       = document.getElementById("canvas");
const ctx          = canvas.getContext("2d");
const statusEl     = document.getElementById("status");
const meterFill    = document.getElementById("meterFill");
const confPct      = document.getElementById("conf-pct");
const authFlash    = document.getElementById("authFlash");
const logEl        = document.getElementById("log");
const registerBtn  = document.getElementById("registerBtn");
const faceBadge    = document.getElementById("face-badge");
const slider       = document.getElementById("thresholdSlider");
const camDot       = document.getElementById("camDot");
const camOffline   = document.getElementById("camOffline");
const offlineMsg   = document.getElementById("offlineMsg");
const ipInput      = document.getElementById("ipInput");
const streamSelect = document.getElementById("streamSelect");
const customUrlEl  = document.getElementById("customUrl");

let registeredDescriptor = null;
let bluetoothDevice      = null;
let cameraOnline         = false;
let snapshotMode         = false;   // true when using snapshot polling
let snapshotInterval     = null;

/* ════════════════════════════════════════════
   STREAM SELECT — show custom input if needed
════════════════════════════════════════════ */
streamSelect.addEventListener("change", () => {
  customUrlEl.style.display = streamSelect.value === "custom" ? "inline-block" : "none";
});

/* ════════════════════════════════════════════
   CAMERA CONNECTION
   TruView cameras typically expose:
     • MJPEG stream  : http://<ip>/videostream.cgi  (or /mjpeg/1)
     • Snapshot      : http://<ip>/snapshot.cgi
   We load the chosen URL into <img>.
   For snapshot mode we poll every 200 ms.
════════════════════════════════════════════ */
function buildStreamUrl() {
  const ip   = ipInput.value.trim();
  const path = streamSelect.value;

  if (path === "custom") return customUrlEl.value.trim();
  return `http://${ip}${path}`;
}

function connectCamera() {
  // Clear previous snapshot interval
  if (snapshotInterval) { clearInterval(snapshotInterval); snapshotInterval = null; }

  const url = buildStreamUrl();
  snapshotMode = streamSelect.value === "/snapshot.cgi" || streamSelect.value === "custom";

  addLog(`Connecting → ${url}`, "info");
  offlineMsg.textContent = "CONNECTING...";
  camOffline.classList.remove("hidden");
  camDot.classList.remove("online");
  cameraOnline = false;
  setStatus("CONNECTING...", "");

  if (snapshotMode) {
    // Poll snapshot every 200 ms
    loadSnapshot(url);
    snapshotInterval = setInterval(() => loadSnapshot(url), 200);
  } else {
    // MJPEG: set src directly — browser handles the stream
    camImg.src = "";
    camImg.src = url + (url.includes("?") ? "&" : "?") + "_t=" + Date.now();
  }
}

function loadSnapshot(url) {
  const tmp = new Image();
  tmp.crossOrigin = "anonymous";
  tmp.onload = () => {
    camImg.src = tmp.src;
    onCameraOnline();
  };
  tmp.onerror = onCameraOffline;
  tmp.src = url + "?_t=" + Date.now();
}

camImg.onload = onCameraOnline;
camImg.onerror = onCameraOffline;

function onCameraOnline() {
  if (!cameraOnline) {
    cameraOnline = true;
    camOffline.classList.add("hidden");
    camDot.classList.add("online");
    setStatus("CAMERA LIVE — REGISTER FACE", "");
    addLog("Camera online ✓", "grant");
  }
}

function onCameraOffline() {
  cameraOnline = false;
  camOffline.classList.remove("hidden");
  offlineMsg.textContent = "CAMERA OFFLINE";
  camDot.classList.remove("online");
  setStatus("CAMERA OFFLINE", "denied");
  if (!snapshotMode) addLog("Camera connection failed", "deny");
}

/* Auto-connect on load */
connectCamera();

/* ════════════════════════════════════════════
   FEATURE EXTRACTION  (histogram-based)
   Captures the current <img> frame onto the
   hidden canvas, then extracts a compact
   brightness + hue histogram from the centre
   crop — stable across lighting & minor shifts.
════════════════════════════════════════════ */
function extractDescriptor() {
  ctx.drawImage(camImg, 0, 0, canvas.width, canvas.height);

  const cx = Math.floor(canvas.width  / 2);
  const cy = Math.floor(canvas.height / 2);
  const cw = 200, ch = 240;
  const imageData = ctx.getImageData(cx - cw/2, cy - ch/2, cw, ch);
  const data = imageData.data;

  const lumaBins = new Float32Array(32);
  const hueBins  = new Float32Array(16);
  const total    = data.length / 4;

  for (let i = 0; i < data.length; i += 4) {
    const r = data[i], g = data[i+1], b = data[i+2];
    const luma = (0.299*r + 0.587*g + 0.114*b) / 255;
    lumaBins[Math.min(31, Math.floor(luma * 32))]++;

    const max = Math.max(r,g,b), min = Math.min(r,g,b), delta = max - min;
    if (delta > 20) {
      let hue = 0;
      if      (max===r) hue = ((g-b)/delta)%6;
      else if (max===g) hue = (b-r)/delta+2;
      else              hue = (r-g)/delta+4;
      hue = ((hue*60)+360)%360;
      hueBins[Math.min(15, Math.floor(hue/22.5))]++;
    }
  }

  for (let i=0; i<lumaBins.length; i++) lumaBins[i] /= total;
  for (let i=0; i<hueBins.length;  i++) hueBins[i]  /= total;

  return { lumaBins, hueBins };
}

function compareDescriptors(a, b) {
  let lSim=0, hSim=0;
  for (let i=0; i<a.lumaBins.length; i++) lSim += Math.min(a.lumaBins[i], b.lumaBins[i]);
  for (let i=0; i<a.hueBins.length;  i++) hSim += Math.min(a.hueBins[i],  b.hueBins[i]);
  return lSim*0.6 + hSim*0.4;
}

/* ════════════════════════════════════════════
   REGISTER FACE
════════════════════════════════════════════ */
function registerFace() {
  if (!cameraOnline) {
    addLog("Cannot register — camera offline", "deny");
    return;
  }
  try {
    registeredDescriptor = extractDescriptor();
    localStorage.setItem("faceDesc", JSON.stringify({
      luma: Array.from(registeredDescriptor.lumaBins),
      hue:  Array.from(registeredDescriptor.hueBins)
    }));
    setStatus("FACE ENROLLED ✓", "open");
    registerBtn.classList.add("registered");
    registerBtn.textContent = "[ Re-Register Face ]";
    faceBadge.classList.add("visible");
    addLog("Face enrolled successfully", "grant");
    setTimeout(() => setStatus("SCANNING...", ""), 1800);
  } catch(e) {
    addLog("Capture failed — try again", "deny");
  }
}

/* Load saved face */
(function loadFace() {
  const raw = localStorage.getItem("faceDesc");
  if (!raw) return;
  try {
    const p = JSON.parse(raw);
    registeredDescriptor = {
      lumaBins: new Float32Array(p.luma),
      hueBins:  new Float32Array(p.hue)
    };
    faceBadge.classList.add("visible");
    registerBtn.classList.add("registered");
    registerBtn.textContent = "[ Re-Register Face ]";
    addLog("Saved face profile loaded", "info");
  } catch(e) { localStorage.removeItem("faceDesc"); }
})();

/* ════════════════════════════════════════════
   RECOGNITION LOOP  (runs every 1.5 s)
════════════════════════════════════════════ */
function recognizeFace() {
  if (!registeredDescriptor || !cameraOnline) return;

  try {
    const current    = extractDescriptor();
    const similarity = compareDescriptors(current, registeredDescriptor);
    const threshold  = parseInt(slider.value) / 100;
    const pct        = Math.round(similarity * 100);

    meterFill.style.width = pct + "%";
    confPct.textContent   = pct + "%";

    if (similarity >= threshold) {
      setStatus("✓ GATE OPEN — AUTHORIZED", "open");
      authFlash.className = "auth-flash open";
      sendBluetooth("1");
      if (Math.random() < 0.12) addLog(`Access GRANTED (${pct}%)`, "grant");
    } else {
      setStatus("✗ UNKNOWN — ACCESS DENIED", "denied");
      authFlash.className = "auth-flash closed";
      sendBluetooth("0");
      if (Math.random() < 0.07) addLog(`Access DENIED (${pct}%)`, "deny");
    }
    setTimeout(() => { authFlash.className = "auth-flash"; }, 500);
  } catch(e) { /* frame not ready */ }
}

setInterval(recognizeFace, 1500);

/* ════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════ */
function setStatus(msg, cls) {
  statusEl.textContent = msg;
  statusEl.className   = cls || "";
}

function addLog(msg, type) {
  const now   = new Date().toLocaleTimeString();
  const entry = document.createElement("span");
  entry.className   = "log-entry " + (type||"");
  entry.textContent = `[${now}] ${msg}`;
  logEl.prepend(entry);
}

/* ════════════════════════════════════════════
   BLUETOOTH
════════════════════════════════════════════ */
async function connectBluetooth() {
  try {
    bluetoothDevice = await navigator.bluetooth.requestDevice({ acceptAllDevices: true });
    addLog("Bluetooth paired ✓", "grant");
  } catch {
    addLog("Bluetooth pairing failed", "deny");
  }
}

function sendBluetooth(value) {
  if (!bluetoothDevice) return;
  console.log("BT →", value);
}
</script>
